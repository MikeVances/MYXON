version: "3.9"

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: myxon
      POSTGRES_USER: myxon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myxon_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myxon"]
      interval: 5s
      retries: 5

  # --- Redis (sessions, heartbeat cache, pub/sub) ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://myxon:${DB_PASSWORD:-myxon_dev_pass}@db:5432/myxon
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # --- Frontend (React + Vite, dev server) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # --- FRPS (tunnel server) ---
  frps:
    image: snowdreamtech/frps:latest
    restart: unless-stopped
    ports:
      - "7000:7000"     # frps bind port
      - "7500:7500"     # frps dashboard
      - "10000-10100:10000-10100"  # tunnel port range
    volumes:
      - ./infra/frps/frps.toml:/etc/frp/frps.toml
    command: ["-c", "/etc/frp/frps.toml"]

  # --- Guacamole daemon (guacd) ---
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    ports:
      - "4822:4822"

  # --- Nginx (reverse proxy + TLS termination) ---
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
      - frps

volumes:
  pgdata:
