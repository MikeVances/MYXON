events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Rate limiting — защита от брутфорса на /api/v0/auth/
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:80; }

    # ── HTTP → HTTPS redirect (активируй после получения сертификата) ─────────
    # server {
    #     listen 80;
    #     server_name _;
    #     location /.well-known/acme-challenge/ { root /var/www/certbot; }
    #     location / { return 301 https://$host$request_uri; }
    # }

    # ── HTTP (для первого теста без TLS) ─────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ACME challenge для certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Auth endpoints — rate limit
        location /api/v0/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # NOTE: /api/v0/frps/ is NOT routed through nginx.
        # frps calls backend:8000 directly over the Docker bridge network,
        # so this path never reaches nginx. Security is enforced by Docker
        # network isolation (backend port 8000 is NOT published externally).

        # REST API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket (ws_remote, HMI туннели)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # OpenAPI docs
        location /docs    { proxy_pass http://backend; }
        location /openapi.json { proxy_pass http://backend; }

        # Frontend SPA (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }

    # ── HTTPS (раскомментировать после certbot) ───────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name myxon.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/live/myxon.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/live/myxon.example.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... те же location блоки что выше ...
    # }
}
